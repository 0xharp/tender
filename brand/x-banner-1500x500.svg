<?xml version="1.0" encoding="UTF-8"?>
<!--
  X (Twitter) banner for @tendrdotbid - 1500 x 500.
  Uses the same brand mark + violet accent as tendr.bid.
  X crops the top + bottom on mobile + desktop differently; the centered
  composition keeps the wordmark + tagline visible across both.

  Export: open in any browser or vector tool, export at 1500x500 PNG.
  ImageMagick:  convert -density 150 -background none x-banner-1500x500.svg x-banner-1500x500.png
  rsvg-convert: rsvg-convert -w 1500 -h 500 -f png -o x-banner-1500x500.png x-banner-1500x500.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <!-- Brand background - matches the deep indigo-near-black used on the
         marketing site's hero in dark mode. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#14121f"/>
    </linearGradient>

    <!-- Brand violet to magenta accent gradient (matches the gradient-accent
         token from globals.css). Used for wordmark + seal-of-trust ring. -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>

    <!-- Subtle radial glow behind the mark to give the seal some weight. -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot-matrix pattern - same visual texture as the site backdrop -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.9" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#dots)"/>

  <!-- Glow behind the mark -->
  <circle cx="220" cy="250" r="240" fill="url(#glow)"/>

  <!-- The brand mark (rounded square seal + stylized "t" + offset dot).
       Drawn at 280x280 inside a 320x320 frame, centered at x=220 y=250.
       Stroke uses the accent gradient for that "live" feel.

       The t is drawn as a SINGLE path with multiple subpaths (M moves
       without drawing). Lines as separate <line> elements have degenerate
       bounding boxes (0-width vertical, 0-height horizontal) which makes
       gradient strokes drop out in many rasterizers; one combined path has
       a proper bbox so the gradient stroke renders uniformly. -->
  <g transform="translate(80,110) scale(8.75)">
    <!-- Outer seal -->
    <rect x="2.5" y="2.5" width="27" height="27" rx="7.5"
          fill="none" stroke="url(#accent)" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- t glyph: vertical stroke + hooked baseline (one subpath) and
         horizontal crossbar (second subpath via M) -->
    <path d="M14 9 V20 Q14 22 16 22 M9.5 12.5 H18.5"
          fill="none" stroke="url(#accent)" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- offset dot (the .bid TLD signifier) -->
    <circle cx="22" cy="22" r="1.6" fill="url(#accent)"/>
  </g>

  <!-- Wordmark + tagline column, right of the mark -->
  <g transform="translate(440,0)">
    <!-- "tendr.bid" wordmark - clean sans, bold, large -->
    <text x="0" y="225"
          font-family="'Geist', 'Inter', -apple-system, system-ui, sans-serif"
          font-size="124"
          font-weight="700"
          letter-spacing="-4"
          fill="#ffffff">
      tendr.bid
    </text>

    <!-- Primary tagline - the unique claim -->
    <text x="0" y="290"
          font-family="'Geist', 'Inter', -apple-system, system-ui, sans-serif"
          font-size="34"
          font-weight="500"
          letter-spacing="-0.5"
          fill="url(#accent)">
      Sealed-bid RFP procurement on Solana
    </text>

    <!-- Supporting line - the proof point -->
    <text x="0" y="340"
          font-family="'Geist', 'Inter', -apple-system, system-ui, sans-serif"
          font-size="22"
          font-weight="400"
          letter-spacing="0"
          fill="#a8a4b8">
      Bids stay private even from the buyer, until the window closes.
    </text>
    <text x="0" y="372"
          font-family="'Geist', 'Inter', -apple-system, system-ui, sans-serif"
          font-size="22"
          font-weight="400"
          letter-spacing="0"
          fill="#a8a4b8">
      Cryptography, not policy.
    </text>
  </g>

  <!-- Bottom-right meta: live-on-devnet pill + URL -->
  <g transform="translate(1100,440)">
    <!-- live dot -->
    <circle cx="8" cy="8" r="5" fill="#10b981"/>
    <circle cx="8" cy="8" r="5" fill="#10b981" opacity="0.4">
      <animate attributeName="r" values="5;14;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="22" y="13"
          font-family="'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="14"
          fill="#a8a4b8">
      live on solana devnet · tendr.bid
    </text>
  </g>
</svg>
