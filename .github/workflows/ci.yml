name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: web + sidecar + shared (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']
    steps:
      - uses: actions/checkout@v4

      # Don't pass `version:` here — root package.json has
      # `"packageManager": "pnpm@10.33.0"` and recent minor releases of
      # pnpm/action-setup@v4 error if BOTH the input AND the field are
      # set. Letting the action read packageManager keeps version in
      # one place (the lockfile's source of truth).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: lint (biome)
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      # `next build` runs page-data collection, which actually evaluates
      # module-level code in `apps/web/lib/solana/client.ts`,
      # `lib/supabase/env.ts`, etc. Those files throw at module load if
      # required env vars are missing — by design, so production deploys
      # fail loudly on misconfig. CI has no real env config, so we feed
      # placeholders here that satisfy the presence checks. Real values
      # are set in the Vercel dashboard for the actual deploy.
      #
      # Two values are NOT placeholders and instead match production:
      #   - NEXT_PUBLIC_TENDER_PROGRAM_ID: this is a public on-chain ID
      #     (`address()` from @solana/kit validates the format), so it
      #     must be a well-formed base58 pubkey.
      #   - NEXT_PUBLIC_SOLANA_CLUSTER: trivially "devnet" everywhere.
      - name: build
        env:
          NEXT_PUBLIC_SOLANA_CLUSTER: devnet
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
          NEXT_PUBLIC_SOLANA_WSS_URL: wss://api.devnet.solana.com
          NEXT_PUBLIC_TENDER_PROGRAM_ID: 4RSbGBZQ7CDSv78DG3VoMcaKXBsoYvh9ZofEo6mTCvfQ
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          SUPABASE_JWT_SECRET: ci-placeholder-jwt-secret
        run: pnpm build

  anchor:
    name: programs/tender (anchor build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      # Solana CLI's hardware-wallet support pulls in the `hidapi` crate,
      # which has a build-time link dep on libudev (Ubuntu's ships it
      # in `libudev-dev`). Without this, `cargo install anchor-cli`
      # fails with "could not find system library 'libudev' required
      # by the 'hidapi' crate" partway through compiling deps.
      # pkg-config is what the build script uses to locate libudev.
      - name: install build deps for solana/anchor
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config build-essential

      - name: install solana cli
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      # Drop --locked so we tolerate yanked transitive deps in the
      # crates.io index (e.g., `solana-program-entrypoint v3.0.0` was
      # yanked, which combined with --locked turns a warning into a
      # hard fail on some cargo versions). Anchor 0.32.1 itself is
      # still pinned by --tag.
      - name: install anchor
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli

      - name: anchor build
        run: anchor build
